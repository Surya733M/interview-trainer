# alembic.ini — Alembic Configuration File
# ==========================================
# This file configures the Alembic database migration tool.
#
# The sqlalchemy.url is OVERRIDDEN at runtime by alembic/env.py
# using the value from our application's settings (config.py).
# So you don't need to edit this file manually.

[alembic]
# path to migration scripts
script_location = alembic

# File format for migration scripts
# %(rev)s  → revision id
# %(slug)s → short description
file_template = %%(rev)s_%%(slug)s

# timezone for "Generating" header in migration scripts
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
# even if no changes have been detected
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# version location specification
# version_locations = %(here)s/bar:%(here)s/foo:%(here)s/versions

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy URL — overridden in env.py from settings
sqlalchemy.url = sqlite:///./interview_trainer.db


[post_write_hooks]
# Uncomment to auto-format migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
