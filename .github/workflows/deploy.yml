# =============================================================================
# GitHub Actions CI/CD Pipeline — Interview Trainer Agent
# =============================================================================
#
# WHAT THIS DOES:
#   Every time you push to the `main` branch this workflow:
#     1. Runs backend tests (pytest)
#     2. Runs frontend lint + build (npm run build)
#     3. Builds a Docker image
#     4. Pushes it to IBM Cloud Container Registry (ICR)
#     5. Deploys to IBM Cloud Code Engine
#
# HOW TO SET UP GITHUB SECRETS:
#   Go to GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   Required secrets:
#     IBM_CLOUD_API_KEY          → Your IBM Cloud API key
#     IBM_CLOUD_REGION           → e.g. us-south
#     IBM_ICR_NAMESPACE          → Your ICR namespace (e.g. interview-trainer-ns)
#     IBM_CODE_ENGINE_PROJECT    → Code Engine project name
#     IBM_CODE_ENGINE_APP        → Code Engine app name (e.g. interview-trainer-api)
#
#   Optional (will use fallback if not set):
#     WATSONX_API_KEY            → IBM watsonx.ai API key
#     WATSONX_PROJECT_ID         → IBM watsonx.ai project ID
#     DATABASE_URL               → PostgreSQL connection string
#     SECRET_KEY                 → JWT signing secret (random 64-char string)
# =============================================================================

name: Deploy to IBM Cloud

on:
  push:
    branches: [main]        # Trigger on every push to main
  pull_request:
    branches: [main]        # Also run tests on PRs (but don't deploy)

env:
  # IBM Cloud Container Registry — us.icr.io is the registry for us-south
  REGISTRY: us.icr.io
  IMAGE_NAME: interview-trainer-api

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend Tests ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run backend health check (import test)
        working-directory: backend
        env:
          PYTHONPATH: .
          PYTHONUTF8: "1"
        run: |
          python -c "from app.config import settings; print('Config OK')"
          python -c "from app.database import engine; print('DB OK')"

      # ── Frontend Tests ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Job 2: Build + Push Docker Image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                          # Only runs if tests pass
    if: github.ref == 'refs/heads/main'  # Only on main branch (not PRs)

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install container-registry -f
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" \
            -r "${{ secrets.IBM_CLOUD_REGION }}"

      - name: Login to IBM Container Registry
        run: |
          ibmcloud cr login
          ibmcloud cr namespace-add "${{ secrets.IBM_ICR_NAMESPACE }}" || true

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ secrets.IBM_ICR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${{ secrets.IBM_ICR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          echo "tags=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=${IMAGE_LATEST}" >> $GITHUB_ENV

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            --tag "$IMAGE_TAG" \
            --tag "$IMAGE_LATEST" \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push Docker image to IBM ICR
        run: |
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ── Job 3: Deploy to IBM Cloud Code Engine ────────────────────────────────────
  deploy:
    name: Deploy to IBM Code Engine
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" \
            -r "${{ secrets.IBM_CLOUD_REGION }}"

      - name: Select Code Engine project
        run: |
          ibmcloud ce project select \
            --name "${{ secrets.IBM_CODE_ENGINE_PROJECT }}"

      - name: Deploy to Code Engine
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
        run: |
          # Try to update existing application, create it if it doesn't exist
          ibmcloud ce application update \
            --name "${{ secrets.IBM_CODE_ENGINE_APP }}" \
            --image "${IMAGE_TAG}" \
            --min-scale 1 \
            --max-scale 3 \
            --cpu 1 \
            --memory 4G \
            --port 8000 \
            --env ENV=production \
            --env SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --env WATSONX_API_KEY="${{ secrets.WATSONX_API_KEY }}" \
            --env WATSONX_PROJECT_ID="${{ secrets.WATSONX_PROJECT_ID }}" \
            --env WATSONX_URL="https://us-south.ml.cloud.ibm.com" \
            --env GRANITE_MODEL_ID="ibm/granite-13b-chat-v2" \
            --env COS_API_KEY="${{ secrets.COS_API_KEY }}" \
            --env COS_INSTANCE_CRN="${{ secrets.COS_INSTANCE_CRN }}" \
            2>/dev/null || \
          ibmcloud ce application create \
            --name "${{ secrets.IBM_CODE_ENGINE_APP }}" \
            --image "${IMAGE_TAG}" \
            --min-scale 1 \
            --max-scale 3 \
            --cpu 1 \
            --memory 4G \
            --port 8000 \
            --env ENV=production \
            --env SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --env WATSONX_API_KEY="${{ secrets.WATSONX_API_KEY }}" \
            --env WATSONX_PROJECT_ID="${{ secrets.WATSONX_PROJECT_ID }}" \
            --env WATSONX_URL="https://us-south.ml.cloud.ibm.com" \
            --env GRANITE_MODEL_ID="ibm/granite-13b-chat-v2" \
            --env COS_API_KEY="${{ secrets.COS_API_KEY }}" \
            --env COS_INSTANCE_CRN="${{ secrets.COS_INSTANCE_CRN }}"

      - name: Wait for deployment to be ready
        run: |
          echo "Waiting for Code Engine deployment to complete..."
          sleep 30
          ibmcloud ce application get \
            --name "${{ secrets.IBM_CODE_ENGINE_APP }}"

      - name: Get application URL
        run: |
          APP_URL=$(ibmcloud ce application get \
            --name "${{ secrets.IBM_CODE_ENGINE_APP }}" \
            --output json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d['status']['url'])" \
          )
          echo "Application deployed at: ${APP_URL}"
          echo "Health check: ${APP_URL}/health"
          # Verify health check
          curl -f "${APP_URL}/health" || echo "Health check pending (may take a minute to warm up)"
